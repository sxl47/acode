name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64-v8a
            target: android-arm64
            artifact: acode-arm64.apk
          # - arch: armeabi-v7a
          #   target: android-arm
          #   artifact: acode-arm.apk
          # - arch: x86_64
          #   target: android-x64
          #   artifact: acode-x64.apk
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: flutter pub get

      - name: Apply xterm patches
        run: bash scripts/patch_xterm.sh

      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/release.jks
          EOF
          fi

      - name: Build APK
        run: flutter build apk --release --target-platform ${{ matrix.target }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - run: flutter pub get

      - name: Apply xterm patches
        run: bash scripts/patch_xterm.sh
        shell: bash

      - run: flutter build windows --release

      - name: Package Windows build
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-build.zip
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows-build.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake

      - run: flutter pub get

      - name: Apply xterm patches
        run: bash scripts/patch_xterm.sh

      - run: flutter build linux --release

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

  release:
    name: Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename APKs
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv artifacts/acode-arm64.apk/app-release.apk acode-${VERSION}-arm64.apk
          # mv artifacts/acode-arm.apk/app-release.apk acode-${VERSION}-arm.apk
          # mv artifacts/acode-x64.apk/app-release.apk acode-${VERSION}-x64.apk
          zip -r acode-${VERSION}-linux.zip artifacts/linux-build/
          cp artifacts/windows-build/windows-build.zip acode-${VERSION}-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            acode-${{ github.ref_name }}-arm64.apk
            # acode-${{ github.ref_name }}-arm.apk
            # acode-${{ github.ref_name }}-x64.apk
            acode-${{ github.ref_name }}-linux.zip
            acode-${{ github.ref_name }}-windows.zip
